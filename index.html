<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Personal Assistant</title>
    <!-- Redirect to www folder after 1 second -->
    <meta http-equiv="refresh" content="0; url=www/">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f5f5f5;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2196F3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h2>Loading Personal Assistant...</h2>
    <div class="loader"></div>
    <p>If you're not redirected automatically, 
       <a href="www/">click here</a>.</p>
    
    <!-- Fallback redirect -->
    <script>
        setTimeout(function() {
            window.location.href = 'www/';
        }, 1000);
    </script>
</body>
</html>
